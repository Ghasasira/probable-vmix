  <script>
    let deferredPrompt = null;
    let installPromptAvailable = false;

    // Detect if app is already installed
    function isAppInstalled() {
      // Check if running in standalone mode (already installed)
      if (window.matchMedia('(display-mode: standalone)').matches) {
        return true;
      }
      // Check iOS
      if (window.navigator.standalone === true) {
        return true;
      }
      return false;
    }

    // Check if iOS Safari
    function isIOS() {
      return /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
    }

    // Check if Android Chrome
    function isAndroidChrome() {
      const ua = navigator.userAgent.toLowerCase();
      return ua.indexOf("android") > -1 && ua.indexOf("chrome") > -1;
    }

    // Listen for the install prompt (Chrome/Edge on Android/Desktop)
    window.addEventListener('beforeinstallprompt', (e) => {
      console.log('beforeinstallprompt event fired');
      e.preventDefault();
      deferredPrompt = e;
      installPromptAvailable = true;
      console.log('Install prompt captured and ready');
      
      // Notify Flutter that install is available
      if (window.flutterNotifyInstallAvailable) {
        window.flutterNotifyInstallAvailable();
      }
    });

    // Listen for successful install
    window.addEventListener('appinstalled', (evt) => {
      console.log('App was installed successfully');
      deferredPrompt = null;
      installPromptAvailable = false;
    });

    // Function to trigger install prompt - called from Flutter
    window.presentRequiredInstallPrompt = function() {
      console.log('presentRequiredInstallPrompt called');
      
      // If already installed, do nothing
      if (isAppInstalled()) {
        console.log('App is already installed');
        return 'already_installed';
      }

      // iOS Safari - can't programmatically trigger, return instructions
      if (isIOS()) {
        console.log('iOS detected - returning manual install instructions');
        return 'ios_manual';
      }

      // Chrome/Edge with beforeinstallprompt
      if (deferredPrompt && installPromptAvailable) {
        console.log('Showing native install prompt');
        deferredPrompt.prompt();
        
        deferredPrompt.userChoice.then((choiceResult) => {
          console.log('User choice:', choiceResult.outcome);
          if (choiceResult.outcome === 'accepted') {
            console.log('User accepted the install');
          } else {
            console.log('User dismissed the install');
          }
          deferredPrompt = null;
          installPromptAvailable = false;
        }).catch((err) => {
          console.error('Error with install prompt:', err);
        });
        
        return 'prompted';
      } else {
        console.log('Install prompt not available yet');
        
        // Android Chrome but prompt not ready yet
        if (isAndroidChrome()) {
          return 'android_wait';
        }
        
        // Other browsers - show manual instructions
        return 'manual';
      }
    };

    // Check if install prompt is available - called from Flutter
    window.isInstallPromptAvailable = function() {
      if (isAppInstalled()) {
        return 'installed';
      }
      if (isIOS()) {
        return 'ios';
      }
      if (installPromptAvailable && deferredPrompt) {
        return 'available';
      }
      if (isAndroidChrome()) {
        return 'android_waiting';
      }
      return 'unavailable';
    };

    // Service Worker Registration
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function() {
        navigator.serviceWorker.register('/flutter_service_worker.js');
        navigator.serviceWorker.register('/firebase-messaging-sw.js');
      });
    }
  </script>
